<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338" role="img" aria-label="RAMPART — multi-agent RL portfolio allocation">
  <defs>
    <pattern id="rpgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#232323"/>
    </pattern>
  </defs>
  <rect width="600" height="338" fill="#141414"/>
  <rect width="600" height="338" fill="url(#rpgrid)"/>
  <text x="28" y="44" fill="#8a8378" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="3.5">MULTI-AGENT RL</text>

  <!-- equity / backtest curve behind -->
  <path d="M40,250 L110,238 L150,256 L210,212 L270,224 L330,178 L400,196 L470,150 L560,138" fill="none" stroke="#3a3326" stroke-width="2"/>

  <!-- supervisor node -->
  <g font-family="ui-monospace, monospace">
    <line x1="300" y1="106" x2="180" y2="170" stroke="#6e5a2f" stroke-width="1.5"/>
    <line x1="300" y1="106" x2="300" y2="170" stroke="#6e5a2f" stroke-width="1.5"/>
    <line x1="300" y1="106" x2="420" y2="170" stroke="#6e5a2f" stroke-width="1.5"/>

    <rect x="250" y="80" width="100" height="30" rx="4" fill="rgba(212,168,83,0.10)" stroke="#d4a853" stroke-width="1.8"/>
    <text x="300" y="100" fill="#d4a853" font-size="12" text-anchor="middle">supervisor</text>

    <!-- specialists -->
    <g fill="#a09a8e" font-size="10.5">
      <rect x="138" y="170" width="84" height="28" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.4"/>
      <text x="180" y="188" text-anchor="middle">trend</text>
      <rect x="258" y="170" width="84" height="28" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.4"/>
      <text x="300" y="188" text-anchor="middle">meanrev</text>
      <rect x="378" y="170" width="84" height="28" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.4"/>
      <text x="420" y="188" text-anchor="middle">carry</text>
    </g>
  </g>

  <text x="28" y="316" fill="#d4a853" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">regime-aware · purged walk-forward backtest</text>
</svg>
