<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338" role="img" aria-label="syncset-db — selective PostgreSQL replication">
  <defs>
    <pattern id="ssgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#232323"/>
    </pattern>
  </defs>
  <rect width="600" height="338" fill="#141414"/>
  <rect width="600" height="338" fill="url(#ssgrid)"/>
  <text x="28" y="44" fill="#8a8378" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="3.5">SELECTIVE REPLICATION</text>

  <!-- source database -->
  <g transform="translate(96,120)">
    <ellipse cx="0" cy="0" rx="46" ry="14" fill="rgba(212,168,83,0.06)" stroke="#6e5a2f" stroke-width="1.6"/>
    <path d="M-46,0 L-46,84 C-46,92 -22,98 0,98 C22,98 46,92 46,84 L46,0" fill="rgba(212,168,83,0.04)" stroke="#6e5a2f" stroke-width="1.6"/>
    <ellipse cx="0" cy="42" rx="46" ry="14" fill="none" stroke="#3a3326" stroke-width="1.3"/>
    <ellipse cx="0" cy="84" rx="46" ry="14" fill="none" stroke="#3a3326" stroke-width="1.3"/>
    <text x="0" y="128" fill="#8a8378" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">source</text>
  </g>

  <!-- target database -->
  <g transform="translate(504,120)">
    <ellipse cx="0" cy="0" rx="46" ry="14" fill="rgba(212,168,83,0.10)" stroke="#d4a853" stroke-width="1.8"/>
    <path d="M-46,0 L-46,84 C-46,92 -22,98 0,98 C22,98 46,92 46,84 L46,0" fill="rgba(212,168,83,0.06)" stroke="#d4a853" stroke-width="1.8"/>
    <ellipse cx="0" cy="42" rx="46" ry="14" fill="none" stroke="#6e5a2f" stroke-width="1.3"/>
    <ellipse cx="0" cy="84" rx="46" ry="14" fill="none" stroke="#6e5a2f" stroke-width="1.3"/>
    <text x="0" y="128" fill="#d4a853" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">target</text>
  </g>

  <!-- selective sync rows: two highlighted, one dim/skipped -->
  <g font-family="ui-monospace, monospace" font-size="9">
    <line x1="148" y1="150" x2="452" y2="150" stroke="#d4a853" stroke-width="1.8"/>
    <polygon points="452,150 444,146 444,154" fill="#d4a853"/>
    <line x1="148" y1="178" x2="452" y2="178" stroke="#d4a853" stroke-width="1.8"/>
    <polygon points="452,178 444,174 444,182" fill="#d4a853"/>
    <line x1="148" y1="206" x2="452" y2="206" stroke="#3a3326" stroke-width="1.5" stroke-dasharray="4 5"/>
    <text x="300" y="143" fill="#8a8378" text-anchor="middle">users.id, users.email</text>
    <text x="300" y="171" fill="#8a8378" text-anchor="middle">orders (subset)</text>
    <text x="300" y="223" fill="#5a5550" text-anchor="middle">logs — skipped</text>
  </g>

  <text x="28" y="316" fill="#d4a853" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">schema-drift detection · crash-safe · PyPI</text>
</svg>
