<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338" role="img" aria-label="nanocoder-math — GPT trained from scratch">
  <defs>
    <pattern id="nmgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#232323"/>
    </pattern>
  </defs>
  <rect width="600" height="338" fill="#141414"/>
  <rect width="600" height="338" fill="url(#nmgrid)"/>
  <text x="28" y="44" fill="#8a8378" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="3.5">LANGUAGE MODEL · FROM SCRATCH</text>

  <!-- stacked transformer blocks -->
  <g transform="translate(60,86)">
    <rect x="0" y="0" width="150" height="34" rx="3" fill="rgba(212,168,83,0.06)" stroke="#6e5a2f" stroke-width="1.4"/>
    <rect x="0" y="46" width="150" height="34" rx="3" fill="rgba(212,168,83,0.06)" stroke="#6e5a2f" stroke-width="1.4"/>
    <rect x="0" y="92" width="150" height="34" rx="3" fill="rgba(212,168,83,0.10)" stroke="#d4a853" stroke-width="1.6"/>
    <rect x="0" y="138" width="150" height="34" rx="3" fill="rgba(212,168,83,0.06)" stroke="#6e5a2f" stroke-width="1.4"/>
    <text x="75" y="113" fill="#d4a853" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">attention</text>
    <text x="75" y="205" fill="#8a8378" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">decoder · 16k BPE</text>
  </g>

  <!-- loss curve -->
  <g transform="translate(300,80)">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#2a2a2a" stroke-width="1.4"/>
    <line x1="0" y1="160" x2="250" y2="160" stroke="#2a2a2a" stroke-width="1.4"/>
    <path d="M6,18 C70,40 110,118 250,140" fill="none" stroke="#d4a853" stroke-width="2.5"/>
    <circle cx="6" cy="18" r="4" fill="#d4625a"/>
    <text x="14" y="16" fill="#a09a8e" font-family="ui-monospace, monospace" font-size="12">645</text>
    <circle cx="250" cy="140" r="4" fill="#d4a853"/>
    <text x="206" y="134" fill="#d4a853" font-family="ui-monospace, monospace" font-size="12">539</text>
    <text x="0" y="184" fill="#8a8378" font-family="ui-monospace, monospace" font-size="10.5">val perplexity ↓ (Muon)</text>
  </g>

  <text x="28" y="316" fill="#d4a853" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">PyTorch · MPS / CUDA · controlled ablations</text>
</svg>
