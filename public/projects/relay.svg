<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338" role="img" aria-label="relay — distributed job queue for Go backed by Redis">
  <defs>
    <pattern id="rlgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#232323"/>
    </pattern>
    <marker id="rlarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#d4a853" stroke-width="1.6"/>
    </marker>
    <marker id="rlarrowdim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#6e5a2f" stroke-width="1.6"/>
    </marker>
  </defs>
  <rect width="600" height="338" fill="#141414"/>
  <rect width="600" height="338" fill="url(#rlgrid)"/>
  <text x="28" y="44" fill="#8a8378" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="3.5">DISTRIBUTED JOB QUEUE</text>

  <!-- scheduler -->
  <g font-family="ui-monospace, monospace">
    <rect x="252" y="60" width="96" height="24" rx="5" fill="rgba(212,168,83,0.04)" stroke="#6e5a2f" stroke-width="1.3"/>
    <text x="300" y="76" fill="#8a8378" font-size="10" text-anchor="middle">cron · schedule</text>
    <line x1="300" y1="84" x2="300" y2="98" stroke="#6e5a2f" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#rlarrowdim)"/>
  </g>

  <!-- producers -->
  <g font-family="ui-monospace, monospace">
    <rect x="40" y="120" width="36" height="22" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.3"/>
    <rect x="40" y="150" width="36" height="22" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.3"/>
    <rect x="40" y="180" width="36" height="22" rx="4" fill="rgba(212,168,83,0.05)" stroke="#6e5a2f" stroke-width="1.3"/>
    <text x="58" y="220" fill="#8a8378" font-size="10" text-anchor="middle">producers</text>
    <line x1="80" y1="161" x2="186" y2="161" stroke="#d4a853" stroke-width="1.7" marker-end="url(#rlarrow)"/>
    <text x="132" y="153" fill="#8a8378" font-size="8.5" text-anchor="middle">enqueue</text>
  </g>

  <!-- redis priority queue -->
  <g font-family="ui-monospace, monospace">
    <rect x="192" y="98" width="210" height="150" rx="8" fill="rgba(212,168,83,0.03)" stroke="#6e5a2f" stroke-width="1.6"/>
    <text x="206" y="120" fill="#d4a853" font-size="11">redis</text>
    <text x="394" y="120" fill="#5a5550" font-size="9" text-anchor="end">priority queues</text>

    <!-- high lane -->
    <text x="206" y="150" fill="#8a8378" font-size="9">high</text>
    <g fill="rgba(212,168,83,0.16)" stroke="#d4a853" stroke-width="1.2">
      <rect x="250" y="138" width="11" height="16" rx="2"/>
      <rect x="266" y="138" width="11" height="16" rx="2"/>
      <rect x="282" y="138" width="11" height="16" rx="2"/>
      <rect x="298" y="138" width="11" height="16" rx="2"/>
      <rect x="314" y="138" width="11" height="16" rx="2"/>
    </g>

    <!-- default lane -->
    <text x="206" y="182" fill="#8a8378" font-size="9">def</text>
    <g fill="rgba(212,168,83,0.10)" stroke="#a07830" stroke-width="1.2">
      <rect x="250" y="170" width="11" height="16" rx="2"/>
      <rect x="266" y="170" width="11" height="16" rx="2"/>
      <rect x="282" y="170" width="11" height="16" rx="2"/>
    </g>

    <!-- low lane -->
    <text x="206" y="214" fill="#5a5550" font-size="9">low</text>
    <g fill="none" stroke="#3a3326" stroke-width="1.2">
      <rect x="250" y="202" width="11" height="16" rx="2"/>
      <rect x="266" y="202" width="11" height="16" rx="2"/>
    </g>
  </g>

  <!-- lease / dequeue to workers -->
  <line x1="402" y1="160" x2="462" y2="160" stroke="#d4a853" stroke-width="1.7" marker-end="url(#rlarrow)"/>
  <text x="432" y="152" fill="#8a8378" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">lease</text>

  <!-- worker pool -->
  <g font-family="ui-monospace, monospace">
    <rect x="466" y="118" width="106" height="26" rx="5" fill="rgba(212,168,83,0.06)" stroke="#d4a853" stroke-width="1.5"/>
    <rect x="466" y="150" width="106" height="26" rx="5" fill="rgba(212,168,83,0.06)" stroke="#d4a853" stroke-width="1.5"/>
    <rect x="466" y="182" width="106" height="26" rx="5" fill="rgba(212,168,83,0.06)" stroke="#d4a853" stroke-width="1.5"/>
    <text x="519" y="135" fill="#d4a853" font-size="9.5" text-anchor="middle">worker 1</text>
    <text x="519" y="167" fill="#d4a853" font-size="9.5" text-anchor="middle">worker 2</text>
    <text x="519" y="199" fill="#d4a853" font-size="9.5" text-anchor="middle">worker 3</text>
    <text x="519" y="226" fill="#8a8378" font-size="10" text-anchor="middle">worker pool</text>
  </g>

  <!-- retry / visibility-timeout requeue -->
  <path d="M466,205 C400,250 360,252 300,248" fill="none" stroke="#6e5a2f" stroke-width="1.4" stroke-dasharray="4 5" marker-end="url(#rlarrowdim)"/>
  <text x="392" y="268" fill="#8a8378" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">nack → retry</text>

  <text x="28" y="316" fill="#d4a853" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">at-least-once · visibility-timeout leases · retries + DLQ</text>
</svg>
